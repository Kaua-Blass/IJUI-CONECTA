<ion-content class="auth-content">
  <div class="auth-hero">
    <div class="auth-logo"><ion-icon name="key-outline"></ion-icon></div>
    <h1>Recuperar senha</h1>
    <p>Enviaremos um link para seu e-mail</p>
  </div>
  <div class="auth-card">
    <h2>Seu e-mail</h2>
    <form [formGroup]="form" (ngSubmit)="enviar()">
      <ion-list lines="none">
        <ion-item class="form-item">
          <ion-label position="stacked">E-mail cadastrado</ion-label>
          <ion-input type="email" placeholder="seu&#64;email.com" formControlName="email"></ion-input>
        </ion-item>
      </ion-list>
      <ion-button expand="block" type="submit" class="btn-green" style="margin-top:8px">Enviar link</ion-button>
    </form>
    <ion-button fill="clear" expand="block" routerLink="/login" class="link-btn">Voltar ao login</ion-button>
  </div>
</ion-content>
