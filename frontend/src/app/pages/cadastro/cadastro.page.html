<ion-content class="auth-content">
  <div class="auth-hero auth-hero--sm">
    <div class="auth-logo"><ion-icon name="city-outline"></ion-icon></div>
    <h1>Criar conta</h1>
    <p>Junte-se à comunidade de Ijuí</p>
  </div>
  <div class="auth-card">
    <form [formGroup]="form" (ngSubmit)="cadastrar()">
      <ion-list lines="none">
        <ion-item class="form-item">
          <ion-label position="stacked">Nome completo *</ion-label>
          <ion-input type="text" placeholder="João da Silva" formControlName="nome"></ion-input>
        </ion-item>
        <ion-item class="form-item">
          <ion-label position="stacked">E-mail *</ion-label>
          <ion-input type="email" placeholder="seu&#64;email.com" formControlName="email"></ion-input>
        </ion-item>
        <ion-item class="form-item">
          <ion-label position="stacked">CPF (opcional)</ion-label>
          <ion-input type="tel" placeholder="000.000.000-00" formControlName="cpf"></ion-input>
        </ion-item>
        <ion-item class="form-item">
          <ion-label position="stacked">Senha *</ion-label>
          <ion-input type="password" placeholder="Mínimo 6 caracteres" formControlName="senha"></ion-input>
        </ion-item>
        <ion-item class="form-item">
          <ion-label position="stacked">Confirmar senha *</ion-label>
          <ion-input type="password" placeholder="Repita a senha" formControlName="confirmarSenha"></ion-input>
        </ion-item>
        <div class="error-msg" *ngIf="form.errors?.['senhasDiferentes'] && form.get('confirmarSenha')?.touched">
          As senhas não coincidem.
        </div>
      </ion-list>
      <ion-button expand="block" type="submit" class="btn-green" style="margin-top:8px">Criar conta</ion-button>
    </form>
    <ion-button fill="clear" expand="block" routerLink="/login" class="link-btn">
      Já tem conta? <strong>&nbsp;Entrar</strong>
    </ion-button>
  </div>
</ion-content>
